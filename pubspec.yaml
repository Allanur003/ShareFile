name: secure_share_files
description: ShareIt-like secure file sharing
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Server
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # Files
  file_picker: ^6.1.1
  path_provider: ^2.1.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5

  # Network
  network_info_plus: ^5.0.1
  wifi_iot: ^0.3.18

  # Permissions
  permission_handler: ^11.1.0

  # Utils
  http: ^1.1.0
  uuid: ^4.2.2
  crypto: ^3.0.3
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
